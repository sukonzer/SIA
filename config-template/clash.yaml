# 全局配置
external-controller: 127.0.0.1:9090
mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: true
    
# 代理模式
tun:
  enable: true
  stack: mixed
  mtu: 9000
  dns-hijack:
    - "any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  
# DNS模块
dns:
  enable: true
  prefer-h3: true
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-filter:
    - geosite:connectivity-check
    - geosite:private
  nameserver:
    - quic://223.5.5.5
    - quic://119.29.29.29
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
  fallback:
    - https://8.8.8.8/dns-query
    - https://1.1.1.1/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4