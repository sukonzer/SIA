pr: &pr {type: select, proxies: [🚀 节点选择, ♻️ 自动选择, ☢ 负载均衡-散列, ☢ 负载均衡-轮询, 🌐 全部节点, 🇭🇰 香港,🇹🇼 台湾, 🇯🇵 日本, 🇸🇬 新加坡, 🇰🇷 韩国, 🇺🇲 美国, 🇩🇪 德国, 🇬🇧 英国, 🧿 其它,🟢 直连]}
best: &best {type: url-test, interval: 300, tolerance: 50, lazy: true, include-all: true}

proxy-providers:
  dingyue:
    url: "" // 订阅地址
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 🟢 直连

global-ua: clash.meta

proxies:
  - name: "🟢 直连"
    type: direct
    udp: true
  
# 策略组
proxy-groups:
  - {name: 🔗 链式-落地, type: select, proxies: [🏡 住宅|机房, 🇺🇲 美国, 🇩🇪 德国, 🇯🇵 日本, 🇭🇰 香港]}
  - {name: 🏡 住宅|机房, type: select, include-all: true, filter: "🏡|🏢"}
  - {name: 🚀 节点选择, type: select, proxies: [☢ 负载均衡-散列, ☢ 负载均衡-轮询, ♻️ 自动选择, 🌐 全部节点, 🇭🇰 香港,🇹🇼 台湾, 🇯🇵 日本, 🇸🇬 新加坡, 🇰🇷 韩国, 🇺🇲 美国, 🇩🇪 德国, 🇬🇧 英国, 🧿 其它, 🟢 直连]}
  - {name: 🌐 全部节点, type: select, include-all: true, filter: "^(?!.*(🟢|原生地址|官网|到期|重置|剩余|流量)).*$" }
  - {name: ☢ 负载均衡-散列, type: load-balance, strategy: consistent-hashing, interval:180, <<: *best, filter: "^(?!.*(🏡|🟢|原生|官网|到期|重置)).*$" }
  - {name: ☢ 负载均衡-轮询, type: load-balance, strategy: round-robin, interval:180, <<: *best, filter: "^(?!.*(🏡|🟢|原生|官网|到期|重置)).*$" }
  #应用分流
  - {name: 📹 YouTube, <<: *pr }
  - {name: 🍀 Google, <<: *pr }
  - {name: 🤖 AI, <<: *pr }
  - {name: 👨‍💻 Github, <<: *pr }
  - {name: 𝕏, <<: *pr }
  - {name: 🎵 TikTok, <<: *pr }
  - {name: 📲 Telegram, <<: *pr }
  - {name: 🎥 NETFLIX, <<: *pr }
  - {name: 💶 PayPal, <<: *pr }
  #地区
  - {name: 🇭🇰 香港, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "港|HK|hk|Hong Kong|HongKong|hongkong"}
  - {name: 🇹🇼 台湾, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "台|新北|彰化|TW|Taiwan"}
  - {name: 🇸🇬 新加坡, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "新加坡|坡|狮城|SG|Singapore"}
  - {name: 🇰🇷 韩国, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "KR|Korea|KOR|首尔|韩|韓"}
  - {name: 🇯🇵 日本, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "日本|川日|东京|大阪|泉日|埼玉|沪日|深日|[^-]日|JP|Japan" }
  - {name: 🇺🇲 美国, type: url-test, tolerance: 20, interval: 300, include-all: true, filter: "美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States"}
  - {name: 🇬🇧 英国, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "英国|Great Britain" }
  - {name: 🇩🇪 德国, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "DE|德国|Germany" }
  - {name: 🧿 其它, type: select, proxies: [♻️ 自动选择, 🌐 全部节点, 🔗 链式-落地]}
  - {name: ♻️ 自动选择, type: url-test, include-all: true, tolerance: 20, interval: 300, lazy: true, filter: "^(?!.*(🏡|🟢|原生地址|官网|到期|重置|剩余|流量)).*$"}


# 规则
rules:
  - AND,((NETWORK,UDP),(DST-PORT,443),(OR,((RULE-SET,geolocation-!cn),(NOT,((RULE-SET,cn_ip)))))),REJECT
  - RULE-SET,category_ads_all,REJECT
  # 业务分流- domain
  - RULE-SET,ai_domain,🤖 AI
  - RULE-SET,youtube_domain,📹 YouTube
  - RULE-SET,google_domain,🍀 Google
  - RULE-SET,github_domain,👨‍💻 Github
  - RULE-SET,x_domain,𝕏
  - RULE-SET,tiktok_domain,🎵 TikTok
  - RULE-SET,telegram_domain,📲 Telegram
  - RULE-SET,netflix_domain,🎥 NETFLIX
  - RULE-SET,paypal_domain,💶 PayPal
  - RULE-SET,apple_domain,🟢 直连
  - RULE-SET,bilibili_domain,🟢 直连
  - RULE-SET,onedrive_domain,🟢 直连
  - RULE-SET,microsoft_domain,🟢 直连

  # 业务分流- ip
  - RULE-SET,ai_ip,🤖 AI,no-resolve
  - RULE-SET,google_ip,🍀 Google,no-resolve
  - RULE-SET,netflix_ip,🎥 NETFLIX,no-resolve
  - RULE-SET,telegram_ip,📲 Telegram,no-resolve

  # 特殊分流
  - DOMAIN-REGEX,^relay-[\w-]+\.tktn\.be$,🔗 链式-落地
  - DOMAIN-SUFFIX,tktn.at,🚀 节点选择
  - DOMAIN-SUFFIX,tktn.be,🚀 节点选择
  - DOMAIN-SUFFIX,vm.talkatone.com,🚀 节点选择
  - DOMAIN-SUFFIX,tenor.com,🚀 节点选择
  - RULE-SET,talkatone_domain,DIRECT
  - IP-CIDR,205.164.56.0/24,DIRECT,no-resolve
  - IP-CIDR,216.172.154.0/24,DIRECT,no-resolve
  - IP-CIDR,50.117.27.0/24,DIRECT,no-resolve
  - IP-CIDR,63.251.124.0/24,DIRECT,no-resolve
  - IP-CIDR,69.46.75.0/24,DIRECT,no-resolve
  - DOMAIN-REGEX,^(.+\.)?kaspersky\.com$,🟢 直连
  - OR,((DOMAIN-SUFFIX,ping0.cc),(DOMAIN-SUFFIX,ippure.com),(DOMAIN-SUFFIX,ip.sb),(DOMAIN-SUFFIX,iplark.com)),🧿 其它
  
  # 绕过大陆
  - RULE-SET,geolocation-!cn,🚀 节点选择
  - RULE-SET,geosite-cn,🟢 直连
  - RULE-SET,cn_ip,🟢 直连,no-resolve
  - MATCH,🚀 节点选择
  
# 规则集
